<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f3;
      --warm-white: #ffffff;
      --gold: #b8933f;
      --gold-light: #d4aa5a;
      --gold-pale: #f0e6cc;
      --gold-bg: #fdf9f0;
      --ink: #1c1a17;
      --ink-mid: #4a4540;
      --ink-soft: #8a8278;
      --border: #e8e0d0;
      --border-light: #f0ebe0;
      --danger: #b03a2e;
      --shadow: 0 2px 12px rgba(28,26,23,0.07);
      --shadow-lg: 0 8px 40px rgba(28,26,23,0.12);
      --font-display: 'Playfair Display', serif;
      --font-body: 'Jost', sans-serif;
      --nav-h: 68px;
    }

    body { font-family: var(--font-body); background: var(--cream); color: var(--ink); min-height: 100vh; }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: var(--ink);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      gap: 16px;
    }

    .nav-brand {
      display: flex; align-items: center; gap: 14px;
    }

    .nav-diamond {
      width: 28px; height: 28px;
      border: 1px solid var(--gold);
      transform: rotate(45deg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-diamond span {
      font-size: 10px; color: var(--gold);
      transform: rotate(-45deg);
      display: block;
    }

    .nav-title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 400;
      color: #fff; letter-spacing: 0.06em;
    }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .btn-nav {
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      letter-spacing: 0.16em; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent; color: rgba(255,255,255,0.7);
      padding: 8px 18px; cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-nav:hover { border-color: var(--gold); color: var(--gold); }
    .btn-nav.gold { border-color: var(--gold); color: var(--gold); }
    .btn-nav.gold:hover { background: var(--gold); color: var(--ink); }
    .btn-nav.ghost { border-color: transparent; color: rgba(255,255,255,0.4); }
    .btn-nav.ghost:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.15); }

    /* ── MAIN ── */
    .main-content { max-width: 1280px; margin: 0 auto; padding: 52px 40px 100px; }

    /* ── EMPTY ── */
    .empty-state {
      text-align: center; padding: 120px 24px; color: var(--ink-soft);
    }
    .empty-diamond {
      width: 56px; height: 56px;
      border: 1px solid var(--gold-pale);
      transform: rotate(45deg);
      margin: 0 auto 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-diamond span { transform: rotate(-45deg); font-size: 22px; color: var(--gold); display: block; }
    .empty-state h3 { font-family: var(--font-display); font-size: 26px; font-weight: 400; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; font-weight: 300; color: var(--ink-soft); margin-bottom: 32px; }

    /* ── BUTTONS ── */
    .btn-primary {
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      background: var(--ink); color: #fff; border: none;
      padding: 13px 28px; cursor: pointer; transition: background 0.2s;
      position: relative; overflow: hidden;
    }
    .btn-primary::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--gold); transition: width 0.3s; }
    .btn-primary:hover { background: #111; }
    .btn-primary:hover::after { width: 100%; }

    .btn-secondary {
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      background: transparent; color: var(--ink-soft);
      border: 1px solid var(--border); padding: 13px 28px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

    .btn-danger {
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      background: var(--danger); color: #fff; border: none;
      padding: 13px 28px; cursor: pointer; transition: background 0.2s;
    }
    .btn-danger:hover { background: #8e2e24; }

    .btn-link {
      background: none; border: none; color: var(--gold);
      font-size: 12px; font-family: var(--font-body); font-weight: 400;
      cursor: pointer; padding: 4px 0; letter-spacing: 0.06em;
      text-decoration: underline; text-underline-offset: 3px;
    }
    .btn-link:hover { color: var(--gold-light); }

    /* ── CATEGORY BLOCK ── */
    .category-block {
      margin-bottom: 64px;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .category-header {
      display: flex; align-items: flex-end; gap: 16px;
      margin-bottom: 32px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      cursor: grab;
    }
    .category-header:active { cursor: grabbing; }

    .cat-drag-grip {
      color: var(--border); font-size: 16px;
      cursor: grab; user-select: none; flex-shrink: 0;
      padding-bottom: 2px;
    }

    .category-header-text { flex: 1; }

    .category-num {
      font-family: var(--font-display);
      font-size: 11px; font-style: italic;
      color: var(--gold); letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .category-name {
      font-family: var(--font-display);
      font-size: 34px; font-weight: 400;
      letter-spacing: 0.01em; line-height: 1;
    }

    .category-actions { display: flex; gap: 8px; align-items: center; padding-bottom: 4px; }

    .btn-icon {
      background: none; border: 1px solid var(--border-light);
      color: var(--ink-soft); width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px; transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }
    .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); background: #fdf2f2; }

    /* ── SUBCATEGORY ── */
    .subcategory-section { margin-bottom: 36px; }

    .subcategory-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-soft); margin-bottom: 20px; font-weight: 500;
      display: flex; align-items: center; gap: 14px;
    }
    .subcategory-label::before { content: ''; width: 20px; height: 1px; background: var(--gold); flex-shrink: 0; }
    .subcategory-label::after  { content: ''; flex: 1; height: 1px; background: var(--border-light); }

    /* ── PRODUCT GRID ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .product-card {
      background: var(--warm-white);
      border: 1px solid var(--border-light);
      position: relative; cursor: grab;
      transition: box-shadow 0.25s, transform 0.25s;
      overflow: hidden;
    }
    .product-card:active { cursor: grabbing; }
    .product-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .product-card.dragging { opacity: 0.35; transform: scale(0.97); }
    .product-card.drag-over { border-color: var(--gold); border-style: dashed; }

    .product-card-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; z-index: 2;
    }
    .product-card:hover .product-card-actions { opacity: 1; }

    .product-drag-grip {
      position: absolute; top: 10px; left: 10px;
      color: rgba(255,255,255,0.7); font-size: 13px;
      opacity: 0; transition: opacity 0.2s; cursor: grab; z-index: 2;
    }
    .product-card:hover .product-drag-grip { opacity: 1; }

    /* Product image */
    .product-image-wrap {
      width: 100%; aspect-ratio: 4/3;
      background: var(--cream);
      overflow: hidden; position: relative;
    }
    .product-image-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .product-card:hover .product-image-wrap img { transform: scale(1.04); }
    .product-no-image {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--border);
    }
    .product-no-image svg { width: 36px; height: 36px; }

    /* Gold accent bar */
    .product-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 0; height: 2px;
      background: linear-gradient(to right, var(--gold), var(--gold-light));
      transition: width 0.35s ease;
    }
    .product-card:hover::after { width: 100%; }

    .product-body { padding: 18px 20px 22px; }

    .product-name {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 400;
      margin-bottom: 8px; padding-right: 16px;
      line-height: 1.3;
    }

    .product-desc {
      font-size: 12px; color: var(--ink-soft); font-weight: 300;
      line-height: 1.6; margin-bottom: 14px;
    }

    .product-price {
      font-size: 16px; font-weight: 500;
      color: var(--gold); letter-spacing: 0.04em;
    }

    /* ── ADD PRODUCT ── */
    .btn-add-product {
      background: none;
      border: 1px dashed var(--border);
      color: var(--ink-soft); font-size: 10px;
      font-family: var(--font-body); letter-spacing: 0.16em;
      text-transform: uppercase; padding: 11px 22px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-add-product:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(28,26,23,0.5); z-index: 200;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--warm-white);
      padding: 44px 40px;
      width: 100%; max-width: 520px;
      animation: slideUp 0.28s ease;
      max-height: 92vh; overflow-y: auto;
      position: relative;
    }
    .modal-sm { max-width: 400px; }

    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-eyebrow {
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); font-weight: 500; margin-bottom: 8px;
    }
    .modal-title {
      font-family: var(--font-display); font-size: 28px; font-weight: 400;
      margin-bottom: 32px; line-height: 1.15;
    }

    .modal-divider {
      height: 1px; background: var(--border-light);
      margin: 24px 0;
    }

    .field { margin-bottom: 22px; }
    .field label {
      display: block; font-size: 10px; font-weight: 500;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--ink-soft); margin-bottom: 10px;
    }
    .field input, .field textarea, .field select {
      width: 100%; border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0; font-size: 14px; font-weight: 300;
      font-family: var(--font-body); color: var(--ink);
      background: transparent; outline: none; transition: border-color 0.25s;
      -webkit-appearance: none;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-bottom-color: var(--gold); }
    .field input::placeholder, .field textarea::placeholder { color: var(--border); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field select { cursor: pointer; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .hint { color: var(--ink-soft); font-size: 10px; font-weight: 300; margin-left: 6px; text-transform: none; letter-spacing: 0; }
    .req  { color: var(--gold); margin-left: 2px; }

    /* Image upload */
    .upload-area {
      border: 1px dashed var(--border);
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--cream);
      position: relative;
    }
    .upload-area:hover { border-color: var(--gold); background: var(--gold-bg); }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-area .upload-icon { font-size: 28px; color: var(--border); margin-bottom: 10px; display: block; }
    .upload-area p { font-size: 11px; color: var(--ink-soft); font-weight: 300; letter-spacing: 0.04em; }
    .upload-area .upload-progress { font-size: 11px; color: var(--gold); margin-top: 8px; display: none; }

    .upload-preview {
      margin-top: 14px;
      position: relative; display: inline-block;
    }
    .upload-preview img {
      width: 100%; max-height: 180px; object-fit: cover;
      border: 1px solid var(--border-light);
    }
    .upload-preview-remove {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.6); color: #fff;
      border: none; width: 26px; height: 26px;
      font-size: 14px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }

    /* Subcategory rows */
    .sub-label {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--ink-soft); font-weight: 500; display: block; margin-bottom: 12px;
    }
    #subList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .sub-row { display: flex; gap: 10px; align-items: center; }
    .sub-row input {
      border: none; border-bottom: 1px solid var(--border);
      padding: 8px 0; font-size: 13px; font-weight: 300; flex: 1;
      font-family: var(--font-body); outline: none; background: transparent;
      transition: border-color 0.2s;
    }
    .sub-row input:focus { border-bottom-color: var(--gold); }
    .sub-row button {
      background: none; border: none; color: var(--ink-soft);
      font-size: 18px; cursor: pointer; padding: 4px 6px;
      line-height: 1; transition: color 0.15s;
    }
    .sub-row button:hover { color: var(--danger); }

    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; }

    .confirm-text { font-size: 14px; color: var(--ink-soft); line-height: 1.7; font-weight: 300; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff; font-size: 12px; font-weight: 300;
      letter-spacing: 0.08em; padding: 14px 28px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
      z-index: 999; white-space: nowrap;
      border-bottom: 2px solid var(--gold);
    }
    .toast.show { opacity: 1; }

    .category-block.cat-drag-over { outline: 1px dashed var(--gold); outline-offset: 8px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .navbar { padding: 0 20px; }
      .main-content { padding: 36px 20px 80px; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    }
    @media (max-width: 600px) {
      .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .modal { padding: 32px 20px; }
      .field-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 400px) {
      .nav-title { font-size: 18px; }
      .btn-nav:not(.gold) { display: none; }
    }

    /* ── PRINT / PDF ── */
    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .navbar, .category-actions, .product-card-actions, .product-drag-grip,
      .cat-drag-grip, .btn-add-product, .toast, .modal-overlay { display: none !important; }
      body { background: #fff; }
      .main-content { padding: 0; max-width: 100%; }
      .category-block { page-break-inside: avoid; margin-bottom: 40px; }
      .category-name { font-size: 24px; }
      .category-header { border-bottom: 1px solid #ccc; }
      .products-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .product-card { border: 1px solid #ddd; transform: none !important; box-shadow: none !important; }
      .product-card::after { display: none; }
      .product-body { padding: 12px 14px 16px; }
      .product-name { font-size: 14px; }
      .product-price { font-size: 13px; }
      .product-image-wrap { aspect-ratio: 4/3; }
      @page { margin: 20mm; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-diamond"><span>◈</span></div>
    <span class="nav-title">Catálogo</span>
  </div>
  <div class="nav-right">
    <button class="btn-nav" id="btnAddCategory">+ Categoría</button>
    <button class="btn-nav gold" id="btnExportPDF">⬇ Exportar PDF</button>
    <button class="btn-nav ghost" id="btnLogout">Salir</button>
  </div>
</nav>

<main class="main-content">
  <div class="empty-state" id="emptyState">
    <div class="empty-diamond"><span>◈</span></div>
    <h3>Tu catálogo está vacío</h3>
    <p>Comenzá creando tu primera categoría de productos.</p>
    <button class="btn-primary" id="btnAddCategoryEmpty">+ Agregar categoría</button>
  </div>
  <div id="categoriesContainer"></div>
</main>

<!-- Modal: Category -->
<div class="modal-overlay" id="modalCategory">
  <div class="modal">
    <p class="modal-eyebrow">Organización</p>
    <h2 class="modal-title" id="modalCategoryTitle">Nueva Categoría</h2>
    <div class="field">
      <label>Nombre de la categoría <span class="req">*</span></label>
      <input type="text" id="inputCategoryName" placeholder="Ej: Bebidas, Entradas..."/>
    </div>
    <div class="modal-divider"></div>
    <label class="sub-label">Subcategorías <span class="hint">(opcional)</span></label>
    <div id="subList"></div>
    <button class="btn-link" id="btnAddSub">+ Agregar subcategoría</button>
    <div class="modal-actions">
      <button class="btn-secondary" id="btnCancelCategory">Cancelar</button>
      <button class="btn-primary" id="btnSaveCategory">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Product -->
<div class="modal-overlay" id="modalProduct">
  <div class="modal">
    <p class="modal-eyebrow">Producto</p>
    <h2 class="modal-title" id="modalProductTitle">Nuevo Producto</h2>

    <div class="field-row">
      <div class="field">
        <label>Categoría <span class="req">*</span></label>
        <select id="inputProductCat">
          <option value="">— Seleccionar —</option>
        </select>
      </div>
      <div class="field">
        <label>Subcategoría <span class="hint">(opcional)</span></label>
        <select id="inputProductSub">
          <option value="">— Ninguna —</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Nombre del producto <span class="req">*</span></label>
      <input type="text" id="inputProductName" placeholder="Ej: Café con leche"/>
    </div>

    <div class="field">
      <label>Descripción <span class="hint">(opcional)</span></label>
      <textarea id="inputProductDesc" placeholder="Breve descripción..."></textarea>
    </div>

    <div class="field">
      <label>Precio (ARS $) <span class="req">*</span></label>
      <input type="number" id="inputProductPrice" placeholder="0.00" min="0" step="0.01"/>
    </div>

    <div class="modal-divider"></div>

    <div class="field">
      <label>Imagen del producto <span class="hint">(opcional)</span></label>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="inputImage" accept="image/*"/>
        <span class="upload-icon">◎</span>
        <p>Clic para subir imagen</p>
        <p class="upload-progress" id="uploadProgress">Subiendo...</p>
      </div>
      <div class="upload-preview" id="uploadPreview" style="display:none; width:100%">
        <img id="previewImg" src="" alt="preview"/>
        <button class="upload-preview-remove" id="btnRemoveImage">✕</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" id="btnCancelProduct">Cancelar</button>
      <button class="btn-primary" id="btnSaveProduct">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Confirm -->
<div class="modal-overlay" id="modalConfirm">
  <div class="modal modal-sm">
    <p class="modal-eyebrow">Confirmar</p>
    <h2 class="modal-title">Eliminar</h2>
    <p class="confirm-text" id="confirmText">¿Estás seguro?</p>
    <div class="modal-actions">
      <button class="btn-secondary" id="btnCancelConfirm">Cancelar</button>
      <button class="btn-danger" id="btnConfirmDelete">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjJ7S7VLtfIY-3N_SrIpgvEkado-wHvUw",
    authDomain: "catalogo-62d38.firebaseapp.com",
    projectId: "catalogo-62d38",
    storageBucket: "catalogo-62d38.firebasestorage.app",
    messagingSenderId: "39586274990",
    appId: "1:39586274990:web:1006cf310ab98f9361973f"
  };

  // Cloudinary config
  const CLOUD_NAME   = "dc0bxgeea";
  const UPLOAD_PRESET = "catalogo_unsigned"; // ← ver instrução abaixo

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser = null;
  let catalog = [];

  function uid() { return '_' + Math.random().toString(36).slice(2, 10); }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    currentUser = user;
    await loadCatalog();
    render();
  });

  async function saveCatalog() {
    if (!currentUser) return;
    try { await setDoc(doc(db, "catalogs", currentUser.uid), { data: JSON.stringify(catalog) }); }
    catch (e) { console.error(e); }
  }

  async function loadCatalog() {
    try {
      const snap = await getDoc(doc(db, "catalogs", currentUser.uid));
      if (snap.exists()) catalog = JSON.parse(snap.data().data || "[]");
    } catch (e) { console.error(e); }
  }

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  function openModal(id)  { document.getElementById(id).classList.add("open"); }
  function closeModal(id) { document.getElementById(id).classList.remove("open"); }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatPrice(val) {
    return Number(val).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ── RENDER ──
  function render() {
    const container = document.getElementById("categoriesContainer");
    const empty     = document.getElementById("emptyState");
    container.innerHTML = "";
    if (catalog.length === 0) { empty.style.display = ""; return; }
    empty.style.display = "none";

    catalog.forEach((cat, catIdx) => {
      const block = document.createElement("div");
      block.className = "category-block";
      block.dataset.catIdx = catIdx;

      const total = (cat.products || []).length;
      block.innerHTML = `
        <div class="category-header" draggable="true" data-cat-idx="${catIdx}">
          <span class="cat-drag-grip">⠿</span>
          <div class="category-header-text">
            <div class="category-num">${String(catIdx + 1).padStart(2,'0')} — ${total} producto${total !== 1 ? 's' : ''}</div>
            <div class="category-name">${escHtml(cat.name)}</div>
          </div>
          <div class="category-actions">
            <button class="btn-icon" data-action="editCat" data-cat-idx="${catIdx}" title="Editar">✎</button>
            <button class="btn-icon danger" data-action="deleteCat" data-cat-idx="${catIdx}" title="Eliminar">✕</button>
          </div>
        </div>
      `;

      const hasSubs = cat.subcategories && cat.subcategories.length > 0;
      if (hasSubs) {
        const uncat = (cat.products || []).filter(p => !p.subcategoryId);
        if (uncat.length > 0) block.appendChild(buildGrid(cat, catIdx, null, uncat));
        cat.subcategories.forEach(sub => {
          const subProds = (cat.products || []).filter(p => p.subcategoryId === sub.id);
          block.appendChild(buildGrid(cat, catIdx, sub, subProds));
        });
      } else {
        block.appendChild(buildGrid(cat, catIdx, null, cat.products || []));
      }

      const addBtn = document.createElement("button");
      addBtn.className = "btn-add-product";
      addBtn.textContent = "+ Agregar producto";
      addBtn.dataset.action = "addProduct";
      addBtn.dataset.catIdx = catIdx;
      block.appendChild(addBtn);
      container.appendChild(block);
    });

    attachDragEvents();
  }

  function buildGrid(cat, catIdx, sub, products) {
    const section = document.createElement("div");
    section.className = "subcategory-section";
    if (sub) section.innerHTML = `<div class="subcategory-label">${escHtml(sub.name)}</div>`;

    const grid = document.createElement("div");
    grid.className = "products-grid";
    grid.dataset.catIdx = catIdx;
    if (sub) grid.dataset.subId = sub.id;

    products.forEach(prod => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.draggable = true;
      card.dataset.prodId  = prod.id;
      card.dataset.catIdx  = catIdx;

      const imgHtml = prod.imageUrl
        ? `<img src="${escHtml(prod.imageUrl)}" alt="${escHtml(prod.name)}" loading="lazy"/>`
        : `<div class="product-no-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;

      card.innerHTML = `
        <span class="product-drag-grip">⠿</span>
        <div class="product-card-actions">
          <button class="btn-icon" data-action="editProd" data-cat-idx="${catIdx}" data-prod-id="${prod.id}">✎</button>
          <button class="btn-icon danger" data-action="deleteProd" data-cat-idx="${catIdx}" data-prod-id="${prod.id}">✕</button>
        </div>
        <div class="product-image-wrap">${imgHtml}</div>
        <div class="product-body">
          <div class="product-name">${escHtml(prod.name)}</div>
          ${prod.desc ? `<div class="product-desc">${escHtml(prod.desc)}</div>` : ''}
          <div class="product-price">ARS $ ${formatPrice(prod.price)}</div>
        </div>
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    return section;
  }

  // ── EVENT DELEGATION ──
  document.getElementById("categoriesContainer").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;
    const { action, catIdx, prodId } = btn.dataset;
    const ci = parseInt(catIdx);
    if (action === "addProduct")  openAddProduct(ci);
    if (action === "editCat")     openEditCategory(ci);
    if (action === "deleteCat")   confirmDelete("categoría", () => deleteCategory(ci));
    if (action === "editProd")    openEditProduct(ci, prodId);
    if (action === "deleteProd")  confirmDelete("producto", () => deleteProduct(ci, prodId));
  });

  document.getElementById("btnAddCategoryEmpty").addEventListener("click", () => openAddCategory());
  document.getElementById("btnAddCategory").addEventListener("click", () => openAddCategory());
  document.getElementById("btnLogout").addEventListener("click", () => signOut(auth).then(() => window.location.href = "index.html"));
  document.getElementById("btnExportPDF").addEventListener("click", () => window.print());

  // ── CATEGORY MODAL ──
  let editingCatIdx = null;

  function openAddCategory() {
    editingCatIdx = null;
    document.getElementById("modalCategoryTitle").textContent = "Nueva Categoría";
    document.getElementById("inputCategoryName").value = "";
    document.getElementById("subList").innerHTML = "";
    openModal("modalCategory");
  }

  function openEditCategory(catIdx) {
    editingCatIdx = catIdx;
    const cat = catalog[catIdx];
    document.getElementById("modalCategoryTitle").textContent = "Editar Categoría";
    document.getElementById("inputCategoryName").value = cat.name;
    document.getElementById("subList").innerHTML = "";
    (cat.subcategories || []).forEach(sub => addSubRow(sub.name, sub.id));
    openModal("modalCategory");
  }

  document.getElementById("btnAddSub").addEventListener("click", () => addSubRow());
  document.getElementById("btnCancelCategory").addEventListener("click", () => closeModal("modalCategory"));

  document.getElementById("btnSaveCategory").addEventListener("click", () => {
    const name = document.getElementById("inputCategoryName").value.trim();
    if (!name) { alert("El nombre es obligatorio."); return; }
    const subs = [];
    document.querySelectorAll("#subList .sub-row input").forEach(inp => {
      const v = inp.value.trim();
      if (v) subs.push({ id: inp.dataset.subId || uid(), name: v });
    });
    if (editingCatIdx !== null) {
      catalog[editingCatIdx].name = name;
      catalog[editingCatIdx].subcategories = subs;
      toast("Categoría actualizada ✓");
    } else {
      catalog.push({ id: uid(), name, subcategories: subs, products: [] });
      toast("Categoría creada ✓");
    }
    closeModal("modalCategory");
    saveCatalog(); render();
  });

  function addSubRow(value = "", subId = "") {
    const row = document.createElement("div");
    row.className = "sub-row";
    const id = subId || uid();
    row.innerHTML = `<input type="text" placeholder="Ej: Sin alcohol" value="${escHtml(value)}" data-sub-id="${id}"/><button type="button">×</button>`;
    row.querySelector("button").addEventListener("click", () => row.remove());
    document.getElementById("subList").appendChild(row);
  }

  // ── PRODUCT MODAL ──
  let addingToCatIdx = null, editingProdId = null;
  let currentImageUrl = "";

  function populateCategoryDropdown(selectedCatIdx = null) {
    const catSel = document.getElementById("inputProductCat");
    catSel.innerHTML = '<option value="">— Seleccionar —</option>';
    catalog.forEach((cat, idx) => {
      const opt = document.createElement("option");
      opt.value = idx;
      opt.textContent = cat.name;
      if (selectedCatIdx !== null && idx === selectedCatIdx) opt.selected = true;
      catSel.appendChild(opt);
    });
    if (selectedCatIdx !== null) populateSubDropdown(selectedCatIdx);
    else document.getElementById("inputProductSub").innerHTML = '<option value="">— Ninguna —</option>';
  }

  function populateSubDropdown(catIdx, selectedSubId = "") {
    const subSel = document.getElementById("inputProductSub");
    subSel.innerHTML = '<option value="">— Ninguna —</option>';
    const cat = catalog[catIdx];
    if (!cat) return;
    (cat.subcategories || []).forEach(sub => {
      const opt = document.createElement("option");
      opt.value = sub.id;
      opt.textContent = sub.name;
      if (sub.id === selectedSubId) opt.selected = true;
      subSel.appendChild(opt);
    });
  }

  document.getElementById("inputProductCat").addEventListener("change", (e) => {
    const idx = parseInt(e.target.value);
    if (!isNaN(idx)) populateSubDropdown(idx);
    else document.getElementById("inputProductSub").innerHTML = '<option value="">— Ninguna —</option>';
  });

  function resetImageUpload() {
    currentImageUrl = "";
    document.getElementById("uploadPreview").style.display = "none";
    document.getElementById("previewImg").src = "";
    document.getElementById("uploadProgress").style.display = "none";
    document.getElementById("uploadProgress").textContent = "Subiendo...";
    document.getElementById("inputImage").value = "";
    document.getElementById("uploadArea").style.display = "";
  }

  function showImagePreview(url) {
    currentImageUrl = url;
    document.getElementById("previewImg").src = url;
    document.getElementById("uploadPreview").style.display = "block";
    document.getElementById("uploadArea").style.display = "none";
  }

  document.getElementById("btnRemoveImage").addEventListener("click", () => resetImageUpload());

  document.getElementById("inputImage").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const progress = document.getElementById("uploadProgress");
    progress.style.display = "block";
    progress.textContent = "Subiendo imagen...";

    try {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);
      formData.append("folder", `catalogo/${currentUser.uid}`);

      const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
      const data = await res.json();
      if (data.secure_url) {
        showImagePreview(data.secure_url);
        toast("Imagen subida ✓");
      } else {
        progress.textContent = "Error al subir. Configurá el upload preset.";
        console.error(data);
      }
    } catch (err) {
      progress.textContent = "Error de conexión.";
      console.error(err);
    }
  });

  function openAddProduct(catIdx) {
    addingToCatIdx = catIdx;
    editingProdId  = null;
    document.getElementById("modalProductTitle").textContent = "Nuevo Producto";
    document.getElementById("inputProductName").value  = "";
    document.getElementById("inputProductDesc").value  = "";
    document.getElementById("inputProductPrice").value = "";
    resetImageUpload();
    populateCategoryDropdown(catIdx);
    openModal("modalProduct");
  }

  function openEditProduct(catIdx, prodId) {
    addingToCatIdx = catIdx;
    editingProdId  = prodId;
    const prod = catalog[catIdx].products.find(p => p.id === prodId);
    document.getElementById("modalProductTitle").textContent = "Editar Producto";
    document.getElementById("inputProductName").value  = prod.name;
    document.getElementById("inputProductDesc").value  = prod.desc || "";
    document.getElementById("inputProductPrice").value = prod.price;
    resetImageUpload();
    if (prod.imageUrl) showImagePreview(prod.imageUrl);
    populateCategoryDropdown(catIdx);
    setTimeout(() => populateSubDropdown(catIdx, prod.subcategoryId || ""), 0);
    openModal("modalProduct");
  }

  document.getElementById("btnCancelProduct").addEventListener("click", () => closeModal("modalProduct"));

  document.getElementById("btnSaveProduct").addEventListener("click", () => {
    const name     = document.getElementById("inputProductName").value.trim();
    const desc     = document.getElementById("inputProductDesc").value.trim();
    const price    = parseFloat(document.getElementById("inputProductPrice").value);
    const catIdx   = parseInt(document.getElementById("inputProductCat").value);
    const subId    = document.getElementById("inputProductSub").value;

    if (!name)              { alert("El nombre es obligatorio."); return; }
    if (isNaN(price))       { alert("El precio es obligatorio."); return; }
    if (isNaN(catIdx))      { alert("Seleccioná una categoría."); return; }

    const targetCat = catalog[catIdx];

    if (editingProdId) {
      // Remove from old category
      const oldCat = catalog[addingToCatIdx];
      const oldIdx = oldCat.products.findIndex(p => p.id === editingProdId);
      const [prod] = oldCat.products.splice(oldIdx, 1);
      prod.name          = name;
      prod.desc          = desc;
      prod.price         = price;
      prod.subcategoryId = subId || null;
      prod.imageUrl      = currentImageUrl || prod.imageUrl || "";
      targetCat.products.push(prod);
      toast("Producto actualizado ✓");
    } else {
      targetCat.products.push({
        id: uid(), name, desc, price,
        subcategoryId: subId || null,
        imageUrl: currentImageUrl || ""
      });
      toast("Producto agregado ✓");
    }

    closeModal("modalProduct");
    saveCatalog(); render();
  });

  // ── DELETE CONFIRM ──
  let pendingDelete = null;

  function confirmDelete(what, fn) {
    pendingDelete = fn;
    document.getElementById("confirmText").textContent = `¿Seguro que querés eliminar este/a ${what}? Esta acción no se puede deshacer.`;
    openModal("modalConfirm");
  }

  document.getElementById("btnCancelConfirm").addEventListener("click", () => { closeModal("modalConfirm"); pendingDelete = null; });
  document.getElementById("btnConfirmDelete").addEventListener("click", () => {
    if (pendingDelete) { pendingDelete(); pendingDelete = null; }
    closeModal("modalConfirm");
  });

  function deleteCategory(catIdx) { catalog.splice(catIdx, 1); saveCatalog(); render(); toast("Categoría eliminada"); }
  function deleteProduct(catIdx, prodId) {
    catalog[catIdx].products = catalog[catIdx].products.filter(p => p.id !== prodId);
    saveCatalog(); render(); toast("Producto eliminado");
  }

  ["modalCategory","modalProduct","modalConfirm"].forEach(id => {
    document.getElementById(id).addEventListener("click", (e) => {
      if (e.target === document.getElementById(id)) closeModal(id);
    });
  });

  // ── DRAG & DROP ──
  let dragCatIdx = null, dragProdId = null, dragProdCatIdx = null;

  function attachDragEvents() {
    document.querySelectorAll(".category-header[draggable]").forEach(header => {
      header.addEventListener("dragstart", (e) => {
        dragCatIdx = parseInt(header.dataset.catIdx); dragProdId = null;
        e.dataTransfer.effectAllowed = "move";
      });
    });

    document.querySelectorAll(".category-block").forEach(block => {
      block.addEventListener("dragover", (e) => {
        if (dragCatIdx === null || dragProdId !== null) return;
        e.preventDefault(); block.classList.add("cat-drag-over");
      });
      block.addEventListener("dragleave", () => block.classList.remove("cat-drag-over"));
      block.addEventListener("drop", (e) => {
        e.preventDefault(); block.classList.remove("cat-drag-over");
        if (dragCatIdx === null || dragProdId !== null) return;
        const targetIdx = parseInt(block.dataset.catIdx);
        if (targetIdx === dragCatIdx) return;
        const [moved] = catalog.splice(dragCatIdx, 1);
        catalog.splice(targetIdx, 0, moved);
        dragCatIdx = null; saveCatalog(); render();
      });
    });

    document.querySelectorAll(".product-card[draggable]").forEach(card => {
      card.addEventListener("dragstart", (e) => {
        dragProdId = card.dataset.prodId; dragProdCatIdx = parseInt(card.dataset.catIdx); dragCatIdx = null;
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => card.classList.add("dragging"), 0);
      });
      card.addEventListener("dragend", () => card.classList.remove("dragging"));
      card.addEventListener("dragover", (e) => { if (!dragProdId) return; e.preventDefault(); card.classList.add("drag-over"); });
      card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
      card.addEventListener("drop", (e) => {
        e.preventDefault(); card.classList.remove("drag-over");
        if (!dragProdId) return;
        const targetProdId = card.dataset.prodId;
        const targetCatIdx = parseInt(card.dataset.catIdx);
        if (dragProdId === targetProdId) return;
        const sourceCat = catalog[dragProdCatIdx];
        const targetCat = catalog[targetCatIdx];
        const sourceIdx = sourceCat.products.findIndex(p => p.id === dragProdId);
        const targetIdx = targetCat.products.findIndex(p => p.id === targetProdId);
        const [moved] = sourceCat.products.splice(sourceIdx, 1);
        if (dragProdCatIdx !== targetCatIdx) targetCat.products.splice(targetIdx, 0, moved);
        else sourceCat.products.splice(targetIdx, 0, moved);
        dragProdId = null; saveCatalog(); render();
      });
    });
  }
</script>
</body>
</html>
