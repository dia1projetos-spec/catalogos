<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f2; --card: #ffffff; --ink: #1a1a1a; --ink-soft: #6b6b6b;
      --accent: #2c2c2c; --accent-hover: #000000; --border: #e0ddd8;
      --error: #c0392b; --radius: 2px;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--ink); }
    .login-wrapper { width: 100%; padding: 24px; display: flex; justify-content: center; }
    .login-card { background: var(--card); border: 1px solid var(--border); padding: 52px 48px; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 20px; animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .brand { text-align: center; margin-bottom: 12px; }
    .brand-icon { font-size: 28px; display: block; margin-bottom: 12px; color: var(--ink); }
    .brand h1 { font-family: var(--font-display); font-size: 38px; font-weight: 300; letter-spacing: 0.04em; }
    .brand-sub { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; font-weight: 300; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); font-weight: 500; }
    .form-group input { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 14px; font-family: var(--font-body); color: var(--ink); background: var(--bg); outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--ink); background: #fff; }
    .btn-login { margin-top: 6px; background: var(--accent); color: #fff; border: none; padding: 14px; font-family: var(--font-body); font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: var(--radius); transition: background 0.2s; }
    .btn-login:hover { background: var(--accent-hover); }
    .error-msg { font-size: 13px; color: var(--error); text-align: center; min-height: 18px; }
    .register-link { text-align: center; font-size: 13px; color: var(--ink-soft); }
    .register-link a { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }
    @media (max-width: 480px) { .login-card { padding: 36px 24px; } }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <span class="brand-icon">◈</span>
        <h1>Catálogo</h1>
        <p class="brand-sub">Gestión de productos</p>
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="usuario@correo.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-login" id="btnLogin">Iniciar sesión</button>
      <p class="error-msg" id="errorMsg"></p>
      <p class="register-link" id="footerLink">¿No tenés cuenta? <a id="linkToggle">Registrarse</a></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDjJ7S7VLtfIY-3N_SrIpgvEkado-wHvUw",
      authDomain: "catalogo-62d38.firebaseapp.com",
      projectId: "catalogo-62d38",
      storageBucket: "catalogo-62d38.firebasestorage.app",
      messagingSenderId: "39586274990",
      appId: "1:39586274990:web:1006cf310ab98f9361973f"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "catalog.html";
    });

    let isRegister = false;

    document.getElementById("linkToggle").addEventListener("click", () => {
      isRegister = !isRegister;
      document.getElementById("btnLogin").textContent = isRegister ? "Crear cuenta" : "Iniciar sesión";
      document.getElementById("footerLink").innerHTML = isRegister
        ? '¿Ya tenés cuenta? <a id="linkToggle">Iniciar sesión</a>'
        : '¿No tenés cuenta? <a id="linkToggle">Registrarse</a>';
      document.getElementById("linkToggle").addEventListener("click", arguments.callee);
    });

    document.getElementById("btnLogin").addEventListener("click", async () => {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");
      errorMsg.textContent = "";
      if (!email || !password) { errorMsg.textContent = "Completá todos los campos."; return; }
      try {
        if (isRegister) await createUserWithEmailAndPassword(auth, email, password);
        else            await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "catalog.html";
      } catch (err) {
        const msgs = {
          "auth/user-not-found": "Usuario no encontrado.",
          "auth/wrong-password": "Contraseña incorrecta.",
          "auth/invalid-email": "Correo inválido.",
          "auth/email-already-in-use": "El correo ya está registrado.",
          "auth/weak-password": "La contraseña debe tener al menos 6 caracteres.",
          "auth/invalid-credential": "Credenciales inválidas."
        };
        errorMsg.textContent = msgs[err.code] || "Error al iniciar sesión.";
      }
    });

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("btnLogin").click();
    });
  </script>
</body>
</html>
